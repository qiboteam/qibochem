# VQE with the UCCSD ansatz on H2.
# Run with:  qibochem run vqe.yaml

version: 1

molecule:
  geometry:
    - [H, [0.0, 0.0, 0.0]]
    - [H, [0.0, 0.0, 0.74804]]
  charge: 0
  multiplicity: 1
  basis: sto-3g
  # active: [...]   # optional active space

hamiltonian:
  mapping: jw

method:
  kind: vqe
  ansatz:
    kind: ucc            # ucc | givens | he | qeb | symm | basis_rotation
    excitations: [singles, doubles]
    # layers: 2          # only used when kind=he
  optimizer:
    name: BFGS           # any scipy.optimize.minimize method, or 'qibo'
    options:
      maxiter: 200
    initial_parameters: zeros   # zeros | random | mp2 | [explicit list of floats]
    seed: 0
  n_shots: null           # null = exact statevector

output:
  save_parameters: true
  save_circuit: false     # write OpenQASM alongside the JSON result
  log_level: info
